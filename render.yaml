services:
  # Monolithic Service (Frontend + Backend)
  - type: web
    name: runterra
    env: node
    rootDir: server
    buildCommand: npm install && cd ../client && npm install && npm run build && cd ../server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: VITE_API_URL
        value: /api
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
