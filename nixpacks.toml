[phases.setup]
nixPkgs = ["nodejs-18_x"]

[phases.install]
cmds = [
  "npm install --prefix client",
  "npm install --prefix server"
]

[phases.build]
cmds = [
  "npm run build --prefix client",
  "mkdir -p server/public",
  "cp -r client/dist/* server/public/"
]

[start]
cmd = "cd server && npm start"
